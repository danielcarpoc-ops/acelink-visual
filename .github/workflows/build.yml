name: Build Electron App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Node dependencies
        run: npm install
        
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller telethon
          
      - name: Build Python script
        run: pyinstaller --distpath python-bin --onefile python/telegram_worker.py
          
      - name: Build Electron App (Mac)
        if: matrix.os == 'macos-latest'
        run: npm run package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build Electron App (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run package:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload Mac Artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: AceLink-Visual-Mac
          path: release/*.dmg
          
      - name: Upload Windows Artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: AceLink-Visual-Windows
          path: release/*.exe